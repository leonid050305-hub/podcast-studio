<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Заявка</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { overflow: hidden; }
    body { overflow-y: auto; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1e1108;
      color: #f2dfbc;
      padding: 2rem 2.5rem;
    }

    h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 2rem;
      color: #f2dfbc;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.95rem;
      color: #d4b896;
      margin-bottom: 0.5rem;
    }

    input[type="date"] {
      cursor: pointer;
      position: relative;
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    input, select, textarea {
      width: 100%;
      background: #120a03;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 0.9rem 1.2rem;
      color: #f2dfbc;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #c8891a;
    }

    select option {
      background: #1e1108;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button {
      width: 100%;
      padding: 0.85rem;
      background: #c8891a;
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 0 24px rgba(200,137,26,0.35);
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .consent {
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
      margin-bottom: 1.2rem;
    }

    .consent input[type="checkbox"] {
      width: 18px;
      min-width: 18px;
      height: 18px;
      margin-top: 2px;
      accent-color: #c8891a;
      cursor: pointer;
      border-radius: 4px;
    }

    .consent span {
      font-size: 0.85rem;
      color: #d4b896;
      line-height: 1.5;
    }

    .consent a {
      color: #c8891a;
      text-decoration: underline;
    }

    .success {
      display: none;
      text-align: center;
      padding: 2rem;
      color: #c8891a;
      font-size: 1.1rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <h2>Оставить заявку</h2>

  <form id="bookingForm" onsubmit="submitForm(event)">
    <div class="form-group">
      <label>Ваше имя</label>
      <input type="text" placeholder="Иван Иванов" required />
    </div>
    <div class="form-group">
      <label>Телефон</label>
      <input type="tel" id="phone" placeholder="+7 (___) ___-__-__" required />
    </div>
    <div class="form-group">
      <label>Тариф</label>
      <select required>
        <option value="" disabled selected>Выберите тариф</option>
        <option>Базовый — от 5 000 ₽</option>
        <option>Стандарт — от 9 000 ₽</option>
        <option>Стандарт плюс — от 15 750 ₽</option>
        <option>Расширенный — от 11 000 ₽</option>
        <option>Расширенный Стандарт плюс — от 17 100 ₽</option>
      </select>
    </div>
    <div class="form-group">
      <label>Желаемая дата</label>
      <input type="date" id="dateInput" />
    </div>
    <label class="consent">
      <input type="checkbox" required />
      <span>Я согласен(а) с <a href="privacy.html" target="_blank">политикой конфиденциальности</a> и даю согласие на обработку персональных данных</span>
    </label>
    <button type="submit">Записаться</button>
  </form>

  <div class="success" id="successMsg">
    ✅ Заявка отправлена!<br/>Мы свяжемся с вами в ближайшее время.
  </div>

  <script>
    const phoneInput = document.getElementById('phone');
    phoneInput.addEventListener('focus', () => {
      if (!phoneInput.value) phoneInput.value = '+7 ';
    });
    phoneInput.addEventListener('input', () => {
      if (!phoneInput.value.startsWith('+7')) {
        phoneInput.value = '+7 ' + phoneInput.value.replace(/^\+7\s*/, '');
      }
    });
    phoneInput.addEventListener('blur', () => {
      if (phoneInput.value === '+7 ') phoneInput.value = '';
    });
  </script>

  <script>
    async function submitForm(e) {
      e.preventDefault();

      const form = e.target;
      const consent = form.querySelector('input[type="checkbox"]');
      if (!consent.checked) {
        consent.closest('.consent').style.outline = '1.5px solid #e05555';
        consent.closest('.consent').style.borderRadius = '6px';
        consent.closest('.consent span').style.color = '#e07070';
        consent.focus();
        return;
      }

      const inputs = form.querySelectorAll('input, select');
      const name    = inputs[0].value;
      const phone   = inputs[1].value.replace(/[\s\(\)\-]/g, '').replace(/^\+7/, '8');
      const tariff  = inputs[2].value;
      const date    = inputs[3].value;

      const text = `📋 Новая заявка!\n\n👤 Имя: ${name}\n📞 Телефон: ${phone}\n🎙 Тариф: ${tariff}\n📅 Дата: ${date || 'не указана'}`;

      const TOKEN   = '8863915468:AAG61zZo07cdzuUQvpPtMzLSDt8OcWDyK-A';
      const CHAT_ID = '1472482029';

      const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzEXE10yqSuqaLe-tUlkQysct0X4xYDCFAcVHpTQejNnZOYj60uX-D6Ww-457afNz0G/exec';

      try {
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: CHAT_ID, text })
        });
      } catch (err) {
        console.error('Ошибка отправки в Telegram:', err);
      }

      try {
        await fetch(SHEETS_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ name, phone, tariff, date: date || 'не указана' })
        });
      } catch (err) {
        console.error('Ошибка отправки в Google Sheets:', err);
      }

      document.getElementById('bookingForm').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
    }
  </script>

</body>
</html>
